name: Docs BDocGen Build

on:
  workflow_dispatch:
  push:
    paths:
      - "docs/**"
      - "tools/bdocgen/**"
      - ".github/workflows/docs-bdocgen.yml"
  pull_request:
    paths:
      - "docs/**"
      - "tools/bdocgen/**"
      - ".github/workflows/docs-bdocgen.yml"

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SBCL
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl

      - name: Install OCiCL
        run: |
          DEB_URL=$(curl -fsSL https://api.github.com/repos/ocicl/ocicl/releases/latest | jq -r '.assets[] | select(.name | endswith("_amd64.deb")) | .browser_download_url' | head -n1)
          if [ -z "$DEB_URL" ] || [ "$DEB_URL" = "null" ]; then
            echo "Failed to resolve OCiCL amd64 .deb asset from latest release" >&2
            exit 1
          fi
          wget -O ocicl_latest_amd64.deb "$DEB_URL"
          sudo apt install -y ./ocicl_latest_amd64.deb

      - name: Cache OCiCL artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/ocicl
            tools/bdocgen/ocicl
          key: ${{ runner.os }}-ocicl-${{ hashFiles('tools/bdocgen/ocicl.csv') }}
          restore-keys: |
            ${{ runner.os }}-ocicl-

      - name: Sync OCiCL dependencies
        working-directory: tools/bdocgen
        run: |
          OCICL_LOCAL_ONLY=1 ocicl setup
          OCICL_LOCAL_ONLY=1 ocicl install py4cl2-cffi rove hunchentoot

      - name: Compile docs with BDocGen
        run: >-
          sbcl --script tools/bdocgen/scripts/run.lisp
          --scope project
          --project-root "${{ github.workspace }}"
          --docs-root docs
          --output-dir docs/_build_lisp
          --addon-name blender-addon-framework

      - name: Add .nojekyll marker
        run: touch docs/_build_lisp/.nojekyll

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: bdocgen-docs-build
          path: docs/_build_lisp

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build_lisp

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
